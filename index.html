<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然齋 - 訂單管理小幫手 (穩定版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease; background-color: #f8fafc; }
        .loader { border: 4px solid #f3f3f3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #6366f1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .transition-theme { transition: all 0.4s ease; }
        .confirm-modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; }
        input:focus, select:focus, textarea:focus { border-color: transparent !important; ring: 2px !important; }
    </style>
</head>
<body class="text-slate-800">
    <div id="root">
        <div style="display: flex; height: 100vh; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; text-align: center; padding: 20px;">
            <div class="loader" style="border-top: 4px solid #6366f1;"></div>
            <div>
                <p style="color: #6366f1; font-weight: 900; font-size: 1.25rem;">自然齋系統啟動中</p>
                <p style="color: #94a3b8; font-size: 0.875rem; margin-top: 0.5rem;">正在安全地建立雲端加密連線...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- sb_publishable_Fg4Lzm0Ga0UvkCET6lZMMQ_MnBwbPMA ---
        const supabaseUrl = 'https://gxpcnasitosnjgcxemcm.supabase.co'; // 第 58 行
        const supabaseKey = '這裡貼上你截圖中那串 sb_publishable... 的金鑰'; // 第 59 行
        // ----------------------------------------

        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const initialConfigs = { '黃金滿福餃(營業用)': 40 };

        function App() {
            const [orders, setOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [toast, setToast] = useState(null); 
            const [flavorConfigs, setFlavorConfigs] = useState(initialConfigs);
            const [savedItems, setSavedItems] = useState(Object.keys(initialConfigs));
            const [editingConfigs, setEditingConfigs] = useState([]); 
            const [activeTab, setActiveTab] = useState('pending'); 
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isConfirmOpen, setIsConfirmOpen] = useState(false); 
            const [editingOrderId, setEditingOrderId] = useState(null);
            const [isAddingNewItem, setIsAddingNewItem] = useState(false);
            const [newItemName, setNewItemName] = useState('');
            const [filterFlavor, setFilterFlavor] = useState(''); 
            const submitActionRef = useRef('normal');
            const [pendingOrderData, setPendingOrderData] = useState(null); 

            const [formData, setFormData] = useState({
                customerName: '', itemName: '', quantity: '', unit: '袋',
                piecesPerUnit: 250, logistics: '', boxType: '', itemsPerBox: '', shippingMark: false, 
                isMixedBox: false, targetDate: '', scheduledDate: '', notes: ''
            });

            const theme = useMemo(() => {
                const map = {
                    pending: { bg: 'bg-amber-50', header: 'bg-amber-500', accent: 'text-amber-700', btn: 'bg-amber-600', border: 'border-amber-200' },
                    scheduled: { bg: 'bg-emerald-50', header: 'bg-emerald-600', accent: 'text-emerald-700', btn: 'bg-emerald-600', border: 'border-emerald-200' },
                    prepared: { bg: 'bg-sky-50', header: 'bg-sky-500', accent: 'text-sky-700', btn: 'bg-sky-600', border: 'border-sky-200' },
                    shipped: { bg: 'bg-slate-100', header: 'bg-slate-500', accent: 'text-slate-600', btn: 'bg-slate-600', border: 'border-slate-200' },
                    stats: { bg: 'bg-rose-50', header: 'bg-rose-500', accent: 'text-rose-700', btn: 'bg-rose-600', border: 'border-rose-200' }
                };
                return map[activeTab] || map.pending;
            }, [activeTab]);

            useEffect(() => {
                const fetchData = async () => {
                    const { data: ordersData } = await supabase.from('orders').select('*');
                    if (ordersData) setOrders(ordersData);
                    const { data: settingsData } = await supabase.from('settings').select('*').eq('id', 'flavorConfig').single();
                    if (settingsData) {
                        setFlavorConfigs(settingsData.configs || initialConfigs);
                        setSavedItems(settingsData.items || Object.keys(initialConfigs));
                    }
                    setIsLoading(false);
                };
                fetchData();
                const channel = supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public' }, () => fetchData()).subscribe();
                return () => { supabase.removeChannel(channel) };
            }, []);

            useEffect(() => { if (!isLoading && window.lucide) window.lucide.createIcons(); });

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            const getNormalBasis = (name) => flavorConfigs[name] || 40;

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                setPendingOrderData({ ...formData });
                setIsConfirmOpen(true);
            };

            const executeSave = async () => {
                const id = editingOrderId || Date.now().toString();
                await supabase.from("orders").upsert({ ...pendingOrderData, id, status: 'pending', createdAt: Date.now() });
                showToast("同步成功 ✅");
                setIsConfirmOpen(false);
                setIsFormOpen(false);
            };

            const sortedOrders = useMemo(() => [...orders].sort((a,b) => b.createdAt - a.createdAt), [orders]);
            const filteredOrders = sortedOrders.filter(o => o.status === activeTab);

            if (isLoading) return null;

            return (
                <div className={`min-h-screen pb-24 ${theme.bg}`}>
                    {toast && <div className="fixed top-10 left-0 right-0 z-[110] flex justify-center"><div className="bg-emerald-600 text-white px-6 py-3 rounded-full shadow-lg font-bold">{toast}</div></div>}
                    <header className={`${theme.header} text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-md`}>
                        <h1 className="text-xl font-black">🥟 自然齋訂單管理</h1>
                        <button onClick={() => setIsFormOpen(true)} className="bg-white text-slate-700 px-4 py-2 rounded-full font-bold text-sm">新增客訂</button>
                    </header>

                    <main className="max-w-2xl mx-auto p-4">
                        <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                            {['pending', 'scheduled', 'prepared', 'shipped'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap ${activeTab === t ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400'}`}>
                                    {t==='pending'?'待安排':t==='scheduled'?'已排程':t==='prepared'?'已備貨':'已出貨'}
                                </button>
                            ))}
                        </div>

                        <div className="space-y-4">
                            {filteredOrders.map(o => (
                                <div key={o.id} className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-start mb-2">
                                        <div className="font-black text-xl text-slate-700">{o.customerName}</div>
                                        <div className="text-xs bg-slate-100 px-2 py-1 rounded-lg text-slate-500 font-bold">{o.logistics}</div>
                                    </div>
                                    <div className="text-indigo-600 font-black text-lg">{o.itemName} x {o.quantity}{o.unit}</div>
                                    {o.notes && <div className="mt-2 text-sm text-slate-400 italic">註：{o.notes}</div>}
                                </div>
                            ))}
                        </div>
                    </main>

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <form onSubmit={handleFormSubmit} className="bg-white w-full max-w-md rounded-[3rem] p-8 space-y-4 shadow-2xl">
                                <h2 className="text-2xl font-black mb-4">新增訂單</h2>
                                <input name="customerName" placeholder="客戶名稱" required onChange={handleInputChange} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold" />
                                <select name="itemName" onChange={handleInputChange} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold">
                                    {savedItems.map(f => <option key={f} value={f}>{f}</option>)}
                                </select>
                                <div className="flex gap-2">
                                    <input name="quantity" type="number" placeholder="數量" required onChange={handleInputChange} className="flex-1 bg-slate-50 p-4 rounded-2xl outline-none font-bold" />
                                    <select name="unit" onChange={handleInputChange} className="w-40 bg-slate-50 p-4 rounded-2xl outline-none font-bold"><option value="袋">袋</option><option value="包">包</option></select>
                                </div>
                                <textarea name="notes" placeholder="備註" onChange={handleInputChange} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-bold resize-none" rows="2" />
                                <div className="flex gap-3 pt-4">
                                    <button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">取消</button>
                                    <button type="submit" className="flex-[2] py-4 bg-slate-700 text-white rounded-2xl font-bold">儲存訂單</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {isConfirmOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[110] p-6">
                            <div className="bg-white p-8 rounded-[3rem] text-center space-y-6 shadow-2xl">
                                <h3 className="text-xl font-black">確認儲存這筆訂單嗎？</h3>
                                <div className="flex flex-col gap-2">
                                    <button onClick={executeSave} className="py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg">是的，存檔</button>
                                    <button onClick={() => setIsConfirmOpen(false)} className="py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">返回修改</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
